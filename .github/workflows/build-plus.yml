name: Build Plus

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
        default: x64
      os:
        required: true
        type: string
      # Dependency versions
      qt-version:
        required: false
        type: string
        default: '5.15.0'
      vtk-cache-key:
        required: true
        type: string
      itk-cache-key:
        required: true
        type: string

      # Plus cache
      plus-cache-key:
        required: false
        type: string

      # Plus build options
      plus-config:
        required: true
        type: string

      # Uploaded archive name
      archive-name:
        required: false
        type: string
        default: PlusInstaller

      # Repos/tags for PlusLib and PlusApp
      pluslib-repository:
        required: false
        type: string
        default: https://github.com/PlusToolkit/PlusLib.git
      pluslib-tag:
        required: false
        type: string
        default: master
      plusapp-repository:
        required: false
        type: string
        default: https://github.com/PlusToolkit/PlusApp.git
      plusapp-tag:
        required: false
        type: string
        default: master

      use-pltools:
        required: false
        type: boolean
        default: false

    secrets:
      pltools-access-token:
        required: false

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
    - name: Restore VTK Cache
      uses: actions/cache/restore@v6
      with:
        path: vtk-install
        key: ${{ inputs.vtk-cache-key }}

    - name: Restore ITK Cache
      uses: actions/cache/restore@v6
      with:
        path: itk-install
        key: ${{ inputs.itk-cache-key }}

    - name: Plus Cache
      if: ${{ inputs.plus-cache-key != '' }}
      id: cache-plus
      uses: actions/cache@v6
      with:
        path: build
        key: ${{ inputs.plus-cache-key }}

    - name: Install CMake
      uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4
      with:
        cmakeVersion: 4.3.4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        dir: ${{ github.workspace }}/Qt
        version: ${{ inputs.qt-version }}
        arch: ${{ inputs.arch == 'x64' && 'win64_msvc2019_64' || 'win32_msvc2019' }}

    - name: Install NSIS
      uses: repolevedavaj/install-nsis@v1.2.1
      with:
        nsis-version: '3.12'

    - name: Clone PlusBuild
      uses: actions/checkout@v7
      with:
        repository: PlusToolkit/PlusBuild
        ref: master
        path: PlusBuild

    - name: Clone PLTools
      if: ${{ inputs.use-pltools }}
      uses: actions/checkout@v7
      with:
        repository: PerkLab/PLTools
        ref: master
        path: PLTools
        token: ${{ secrets.pltools-access-token }}

    - name: Configure PlusBuild
      run: |
        cmake -S PlusBuild -B build `
          -G "Visual Studio 18 2026" -A ${{ inputs.arch }} `
          -DCMAKE_BUILD_TYPE=Release `
          -DPLUSLIB_GIT_REPOSITORY=${{ inputs.pluslib-repository }} `
          -DPLUSLIB_GIT_REVISION=${{ inputs.pluslib-tag }} `
          -DPLUSAPP_GIT_REPOSITORY=${{ inputs.plusapp-repository }} `
          -DPLUSAPP_GIT_REVISION=${{ inputs.plusapp-tag }} `
          -DQt5_Dir="${QT_DIR}" `
          ${{ inputs.plus-config }}

    - name: Build
      shell: pwsh
      working-directory: ${{ github.workspace }}/build
      run: |
        cmake --build . --config Release
        if ($LASTEXITCODE -ne 0) {
          throw "CMake build failed with exit code $LASTEXITCODE"
        }
        ctest -C Release -D Experimental -V
        if ($LASTEXITCODE -ne 0) {
          throw "CTest failed with exit code $LASTEXITCODE"
        }

    - uses: step-security/msvc-dev-cmd@22c98154b708dbd743e6f27a933cf6ceba3305c4 # v1.13.1
    - name: Package
      if: ${{ contains(runner.os, 'windows') && hashFiles('build/PlusApp-bin/CreatePackage.bat') != '' }}
      working-directory: ${{ github.workspace }}/build/PlusApp-bin
      shell: pwsh
      run: |
        .\CreatePackage.bat

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.archive-name }}
        path: ${{github.workspace}}/build/PlusApp-bin/*.exe

    # Delete the installer so that it isn't included in the cache.
    - name: Delete installer
      shell: bash
      run: |
        rm -rfv build/PlusApp-bin/*.exe
        rm -rfv build/PlusApp-bin/*.zip
        rm -rfv build/PlusApp-bin/_CPack_Packages
